name: Refresh NASA exoplanet data, figures, and deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "18 4 * * 1"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-refresh
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Fetch NASA Exoplanet Archive data
        run: python scripts/fetch_exoplanets.py

      - name: Generate Python science figures
        run: python scripts/generate_science_plots.py

      - name: Commit refreshed data and figures if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/exoplanets.json assets/plots
          if git diff --cached --quiet; then
            echo "No data or figure changes to commit."
          else
            git commit -m "Update NASA exoplanet data and science figures"
            git push
          fi

      - name: Prepare static artifact
        run: |
          mkdir -p public
          cp -R index.html 404.html robots.txt sitemap.xml assets data .nojekyll public/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
